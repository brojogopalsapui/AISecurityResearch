<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Security — Animated Hero</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#f8fbff;
    --bg-1:#eef4fb;
    --bg-2:#dbeafe;
    --grid:#d5dfec;
    --cyan:#0369a1;
    --cyan-soft:#38bdf8;
    --violet:#7c3aed;
    --magenta:#db2777;
    --amber:#d97706;
    --red:#dc2626;
    --green:#16a34a;
    --text:#0f172a;
    --muted:#475569;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:radial-gradient(ellipse at center,var(--bg-2) 0%,var(--bg-1) 42%,var(--bg-0) 78%);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow:hidden}
  .stage{position:relative;width:100vw;height:100vh;min-height:720px;overflow:hidden}

  /* animated grid backdrop */
  .grid-bg{
    position:absolute;inset:0;
    background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);
    opacity:.35;
    animation:drift 30s linear infinite;
  }
  @keyframes drift{from{background-position:0 0}to{background-position:44px 44px}}

  /* subtle scanlines */
  .scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(15,23,42,0.028) 0 2px,transparent 2px 4px);mix-blend-mode:multiply}

  /* header */
  .hud{position:absolute;top:28px;left:32px;right:32px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);z-index:20}
  .hud .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:blink 1.4s ease-in-out infinite;margin-right:8px;vertical-align:middle}
  @keyframes blink{50%{opacity:.3}}
  .hud .title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:.3em;color:var(--text)}
  .hud .title span{color:var(--cyan)}

  /* main SVG */
  svg.main{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* legend */
  .legend{position:absolute;bottom:28px;left:32px;right:32px;display:flex;justify-content:center;gap:28px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);z-index:20}
  .legend .item{display:flex;align-items:center;gap:8px}
  .legend .sw{width:14px;height:14px;border-radius:3px;box-shadow:0 0 0 1px rgba(15,23,42,.08),0 0 6px currentColor}
  .legend .threat{color:var(--red)}
  .legend .defense{color:var(--cyan)}
  .legend .data{color:var(--violet)}
  .legend .safe{color:var(--green)}

  /* tagline */
  .tag{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:5}
  .tag h1{font-weight:300;font-size:12px;letter-spacing:.5em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;opacity:0;animation:fadeIn 1s ease-out 1.2s forwards}
  .tag h2{font-weight:700;font-size:22px;letter-spacing:.08em;color:var(--text);opacity:0;animation:fadeIn 1s ease-out 1.5s forwards}
  .tag h2 em{font-style:normal;color:var(--cyan);text-shadow:0 0 14px rgba(8,145,178,.22)}
  @keyframes fadeIn{to{opacity:1}}
</style>
</head>
<body>
<div class="stage">
  <div class="grid-bg"></div>
  <div class="scan"></div>

  <div class="hud">
    <div><span class="dot"></span>SYSTEM ACTIVE • PERIMETER SECURE</div>
    <div class="title">AI <span>/</span> SECURITY</div>
    <div>LAYER 07 • GUARDRAILS ENGAGED</div>
  </div>

  <svg class="main" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- glow filters -->
      <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="10" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- gradients -->
      <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#38bdf8" stop-opacity="1"/>
        <stop offset="50%" stop-color="#0891b2" stop-opacity=".6"/>
        <stop offset="100%" stop-color="#0369a1" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0891b2" stop-opacity=".8"/>
        <stop offset="100%" stop-color="#7c3aed" stop-opacity=".4"/>
      </linearGradient>
      <radialGradient id="threatGrad">
        <stop offset="0%" stop-color="#dc2626"/>
        <stop offset="100%" stop-color="#991b1b" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="dataGrad">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
      </radialGradient>

      <!-- marker arrow -->
      <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
      </marker>

      <!-- dashed path animation via stroke-dashoffset -->
      <style><![CDATA[
        .pulse-ring{transform-origin:800px 450px;animation:pulse 4s ease-out infinite}
        .pulse-ring.d2{animation-delay:1.3s}
        .pulse-ring.d3{animation-delay:2.6s}
        @keyframes pulse{
          0%{transform:scale(.5);opacity:.9}
          80%{opacity:.05}
          100%{transform:scale(1.8);opacity:0}
        }
        .core-inner{transform-origin:800px 450px;animation:breathe 3s ease-in-out infinite}
        @keyframes breathe{
          0%,100%{transform:scale(1)}
          50%{transform:scale(1.06)}
        }
        .rotor{transform-origin:800px 450px}
        .rotor.cw{animation:spin 40s linear infinite}
        .rotor.ccw{animation:spinBack 60s linear infinite}
        .rotor.fast{animation:spin 18s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes spinBack{to{transform:rotate(-360deg)}}

        .shield-seg{animation:shieldPulse 3s ease-in-out infinite}
        @keyframes shieldPulse{
          0%,100%{opacity:.35;stroke-width:2}
          50%{opacity:.9;stroke-width:3}
        }

        /* attack packet traveling along a path */
        .packet{offset-rotate:0deg}
        .pk-1{animation:travel1 5s linear infinite}
        .pk-2{animation:travel2 5s linear infinite;animation-delay:.8s}
        .pk-3{animation:travel3 5s linear infinite;animation-delay:1.6s}
        .pk-4{animation:travel4 5s linear infinite;animation-delay:2.4s}
        .pk-5{animation:travel5 5s linear infinite;animation-delay:3.2s}
        .pk-6{animation:travel6 5s linear infinite;animation-delay:4s}

        @keyframes travel1{0%{offset-distance:0%;opacity:0}5%{opacity:1}70%{offset-distance:70%;opacity:1}72%{opacity:0;transform:scale(2)}100%{offset-distance:72%;opacity:0}}
        @keyframes travel2{0%{offset-distance:0%;opacity:0}5%{opacity:1}70%{offset-distance:70%;opacity:1}72%{opacity:0}100%{offset-distance:72%;opacity:0}}
        @keyframes travel3{0%{offset-distance:0%;opacity:0}5%{opacity:1}70%{offset-distance:70%;opacity:1}72%{opacity:0}100%{offset-distance:72%;opacity:0}}
        @keyframes travel4{0%{offset-distance:0%;opacity:0}5%{opacity:1}70%{offset-distance:70%;opacity:1}72%{opacity:0}100%{offset-distance:72%;opacity:0}}
        @keyframes travel5{0%{offset-distance:0%;opacity:0}5%{opacity:1}70%{offset-distance:70%;opacity:1}72%{opacity:0}100%{offset-distance:72%;opacity:0}}
        @keyframes travel6{0%{offset-distance:0%;opacity:0}5%{opacity:1}70%{offset-distance:70%;opacity:1}72%{opacity:0}100%{offset-distance:72%;opacity:0}}

        /* impact flashes at shield */
        .impact{transform-origin:center;animation:impact 5s ease-out infinite}
        .impact.i1{animation-delay:3.5s}
        .impact.i2{animation-delay:4.3s}
        .impact.i3{animation-delay:5.1s}
        .impact.i4{animation-delay:5.9s}
        .impact.i5{animation-delay:6.7s}
        .impact.i6{animation-delay:7.5s}
        @keyframes impact{
          0%,68%{opacity:0;r:2}
          70%{opacity:1;r:4}
          80%{opacity:.6;r:24}
          100%{opacity:0;r:30}
        }

        /* data flow particles (safe, returning to user apps) */
        .data-pk{animation:dataFlow 4s ease-in-out infinite}
        .data-pk.d1{animation-delay:.4s}
        .data-pk.d2{animation-delay:1.2s}
        .data-pk.d3{animation-delay:2s}
        .data-pk.d4{animation-delay:2.8s}
        @keyframes dataFlow{
          0%{offset-distance:0%;opacity:0}
          10%{opacity:1}
          90%{opacity:1}
          100%{offset-distance:100%;opacity:0}
        }

        /* node cards */
        .node text{font-family:'JetBrains Mono',monospace;font-size:11px;fill:#0f172a;letter-spacing:.1em}
        .node .label{font-size:9px;fill:#64748b;text-transform:uppercase}
        .node-threat rect{fill:rgba(220,38,38,.04);stroke:#dc2626;stroke-width:1.5}
        .node-threat text{fill:#991b1b}
        .node-defense rect{fill:rgba(8,145,178,.04);stroke:#0891b2;stroke-width:1.5}
        .node-defense text{fill:#0f766e}
        .node-user rect{fill:rgba(22,163,74,.04);stroke:#16a34a;stroke-width:1.5}
        .node-user text{fill:#15803d}

        .node-threat{animation:threatThrob 2.5s ease-in-out infinite}
        @keyframes threatThrob{0%,100%{filter:drop-shadow(0 0 4px rgba(220,38,38,.18))}50%{filter:drop-shadow(0 0 14px rgba(220,38,38,.34))}}

        .node-defense{animation:defenseHum 3s ease-in-out infinite}
        @keyframes defenseHum{0%,100%{filter:drop-shadow(0 0 4px rgba(8,145,178,.14))}50%{filter:drop-shadow(0 0 12px rgba(8,145,178,.28))}}

        /* entrance animations */
        .enter{opacity:0;animation:enter .8s ease-out forwards}
        .enter.e1{animation-delay:.1s}
        .enter.e2{animation-delay:.25s}
        .enter.e3{animation-delay:.4s}
        .enter.e4{animation-delay:.55s}
        .enter.e5{animation-delay:.7s}
        .enter.e6{animation-delay:.85s}
        @keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        .core-label{font-family:'Space Grotesk',sans-serif;font-weight:700;fill:#0f172a;text-anchor:middle}
        .core-sub{font-family:'JetBrains Mono',monospace;fill:#38bdf8;text-anchor:middle;letter-spacing:.2em}

        /* orbiting satellites */
        .orbit-dot{fill:#38bdf8}
      ]]></style>
    </defs>

    <!-- BACKGROUND PULSE RINGS from core -->
    <g>
      <circle class="pulse-ring" cx="800" cy="450" r="180" fill="none" stroke="#0891b2" stroke-width="1.5" opacity=".8"/>
      <circle class="pulse-ring d2" cx="800" cy="450" r="180" fill="none" stroke="#0891b2" stroke-width="1.5" opacity=".8"/>
      <circle class="pulse-ring d3" cx="800" cy="450" r="180" fill="none" stroke="#0891b2" stroke-width="1.5" opacity=".8"/>
    </g>

    <!-- OUTER ROTATING RING (decorative) -->
    <g class="rotor ccw">
      <circle cx="800" cy="450" r="340" fill="none" stroke="#c7d6e5" stroke-width="1" stroke-dasharray="2 10"/>
    </g>
    <g class="rotor cw">
      <circle cx="800" cy="450" r="305" fill="none" stroke="#0891b2" stroke-width=".8" stroke-dasharray="30 6 2 6" opacity=".35"/>
    </g>

    <!-- SHIELD LAYER 1: outer - input validation -->
    <g class="rotor cw" filter="url(#softGlow)">
      <circle cx="800" cy="450" r="260" fill="none" stroke="url(#shieldGrad)" stroke-width="2" stroke-dasharray="60 12" opacity=".65"/>
    </g>
    <!-- SHIELD LAYER 2: middle - guardrails -->
    <g class="rotor ccw" filter="url(#softGlow)">
      <circle cx="800" cy="450" r="220" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="4 8" opacity=".55"/>
    </g>
    <!-- SHIELD LAYER 3: inner hexagonal guardrail -->
    <g class="rotor fast" opacity=".8">
      <polygon points="800,270 956,360 956,540 800,630 644,540 644,360"
               fill="none" stroke="#0891b2" stroke-width="2" filter="url(#softGlow)"/>
      <polygon points="800,270 956,360 956,540 800,630 644,540 644,360"
               fill="none" stroke="#38bdf8" stroke-width="1" opacity=".5"/>
    </g>

    <!-- CORE: AI MODEL -->
    <g class="core-inner" filter="url(#bigGlow)">
      <circle cx="800" cy="450" r="110" fill="url(#coreGrad)"/>
      <circle cx="800" cy="450" r="78" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
      <circle cx="800" cy="450" r="78" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3 4" opacity=".7"/>
      <!-- neural network icon -->
      <g stroke="#38bdf8" stroke-width="1.2" fill="#0891b2">
        <line x1="760" y1="420" x2="800" y2="440"/>
        <line x1="760" y1="450" x2="800" y2="440"/>
        <line x1="760" y1="480" x2="800" y2="440"/>
        <line x1="760" y1="420" x2="800" y2="460"/>
        <line x1="760" y1="450" x2="800" y2="460"/>
        <line x1="760" y1="480" x2="800" y2="460"/>
        <line x1="800" y1="440" x2="840" y2="430"/>
        <line x1="800" y1="440" x2="840" y2="470"/>
        <line x1="800" y1="460" x2="840" y2="430"/>
        <line x1="800" y1="460" x2="840" y2="470"/>
        <circle cx="760" cy="420" r="3"/><circle cx="760" cy="450" r="3"/><circle cx="760" cy="480" r="3"/>
        <circle cx="800" cy="440" r="3.5"/><circle cx="800" cy="460" r="3.5"/>
        <circle cx="840" cy="430" r="3"/><circle cx="840" cy="470" r="3"/>
      </g>
      <text class="core-label" x="800" y="405" font-size="14">AI MODEL</text>
      <text class="core-sub" x="800" y="510" font-size="9">LLM • CORE</text>
    </g>

    <!-- ORBITING SAFETY SATELLITES (around the hex shield) -->
    <g class="rotor fast">
      <circle class="orbit-dot" cx="800" cy="270" r="4" filter="url(#softGlow)"/>
      <circle class="orbit-dot" cx="956" cy="360" r="4" filter="url(#softGlow)"/>
      <circle class="orbit-dot" cx="956" cy="540" r="4" filter="url(#softGlow)"/>
      <circle class="orbit-dot" cx="800" cy="630" r="4" filter="url(#softGlow)"/>
      <circle class="orbit-dot" cx="644" cy="540" r="4" filter="url(#softGlow)"/>
      <circle class="orbit-dot" cx="644" cy="360" r="4" filter="url(#softGlow)"/>
    </g>

    <!-- ================= THREAT NODES (left side) ================= -->
    <!-- Each threat has: a card, a path to the shield, packets traveling along it, and an impact flash at shield hit -->

    <!-- Threat 1: Prompt Injection -->
    <path id="p1" d="M 220 140 C 400 200, 540 300, 660 400" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 5" opacity=".35"/>
    <g class="node node-threat enter e1" transform="translate(60 110)">
      <rect width="180" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">PROMPT INJECTION</text>
      <text x="14" y="40" class="label">malicious instructions</text>
    </g>

    <!-- Threat 2: Data Poisoning -->
    <path id="p2" d="M 220 280 C 380 310, 540 360, 660 430" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 5" opacity=".35"/>
    <g class="node node-threat enter e2" transform="translate(60 252)">
      <rect width="180" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">DATA POISONING</text>
      <text x="14" y="40" class="label">training set tampering</text>
    </g>

    <!-- Threat 3: Adversarial Input -->
    <path id="p3" d="M 220 440 C 380 440, 540 445, 660 450" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 5" opacity=".35"/>
    <g class="node node-threat enter e3" transform="translate(60 412)">
      <rect width="180" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">ADVERSARIAL INPUT</text>
      <text x="14" y="40" class="label">crafted perturbations</text>
    </g>

    <!-- Threat 4: Model Extraction -->
    <path id="p4" d="M 220 600 C 380 570, 540 520, 660 470" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 5" opacity=".35"/>
    <g class="node node-threat enter e4" transform="translate(60 572)">
      <rect width="180" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">MODEL EXTRACTION</text>
      <text x="14" y="40" class="label">weight / IP theft</text>
    </g>

    <!-- Threat 5: Jailbreak -->
    <path id="p5" d="M 220 740 C 380 680, 540 570, 660 490" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 5" opacity=".35"/>
    <g class="node node-threat enter e5" transform="translate(60 712)">
      <rect width="180" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">JAILBREAK ATTEMPT</text>
      <text x="14" y="40" class="label">policy bypass</text>
    </g>

    <!-- Threat 6: Membership Inference (top center-left) -->
    <path id="p6" d="M 520 80 C 600 180, 660 280, 720 360" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 5" opacity=".35"/>
    <g class="node node-threat enter e6" transform="translate(420 52)">
      <rect width="190" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">MEMBERSHIP INFERENCE</text>
      <text x="14" y="40" class="label">privacy leakage probe</text>
    </g>

    <!-- PACKETS traveling along threat paths -->
    <circle class="packet pk-1" r="5" fill="#dc2626" filter="url(#softGlow)" style="offset-path:path('M 220 140 C 400 200, 540 300, 660 400')"/>
    <circle class="packet pk-2" r="5" fill="#dc2626" filter="url(#softGlow)" style="offset-path:path('M 220 280 C 380 310, 540 360, 660 430')"/>
    <circle class="packet pk-3" r="5" fill="#dc2626" filter="url(#softGlow)" style="offset-path:path('M 220 440 C 380 440, 540 445, 660 450')"/>
    <circle class="packet pk-4" r="5" fill="#dc2626" filter="url(#softGlow)" style="offset-path:path('M 220 600 C 380 570, 540 520, 660 470')"/>
    <circle class="packet pk-5" r="5" fill="#dc2626" filter="url(#softGlow)" style="offset-path:path('M 220 740 C 380 680, 540 570, 660 490')"/>
    <circle class="packet pk-6" r="5" fill="#dc2626" filter="url(#softGlow)" style="offset-path:path('M 520 80 C 600 180, 660 280, 720 360')"/>

    <!-- IMPACT FLASHES on shield -->
    <circle class="impact i1" cx="660" cy="400" r="2" fill="url(#threatGrad)" filter="url(#bigGlow)"/>
    <circle class="impact i2" cx="660" cy="430" r="2" fill="url(#threatGrad)" filter="url(#bigGlow)"/>
    <circle class="impact i3" cx="660" cy="450" r="2" fill="url(#threatGrad)" filter="url(#bigGlow)"/>
    <circle class="impact i4" cx="660" cy="470" r="2" fill="url(#threatGrad)" filter="url(#bigGlow)"/>
    <circle class="impact i5" cx="660" cy="490" r="2" fill="url(#threatGrad)" filter="url(#bigGlow)"/>
    <circle class="impact i6" cx="720" cy="360" r="2" fill="url(#threatGrad)" filter="url(#bigGlow)"/>

    <!-- ================ DEFENSE NODES (right side) ================ -->
    <!-- These annotate what the shield layers do -->

    <g class="node node-defense enter e1" transform="translate(1360 110)">
      <rect width="200" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">INPUT SANITIZATION</text>
      <text x="14" y="40" class="label">filter • classify • redact</text>
    </g>
    <path d="M 1100 250 C 1200 200, 1300 170, 1360 140" fill="none" stroke="#0891b2" stroke-width="1" stroke-dasharray="2 4" opacity=".5"/>

    <g class="node node-defense enter e2" transform="translate(1360 252)">
      <rect width="200" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">POLICY GUARDRAILS</text>
      <text x="14" y="40" class="label">rules • constitution</text>
    </g>
    <path d="M 1050 360 C 1180 320, 1280 290, 1360 280" fill="none" stroke="#0891b2" stroke-width="1" stroke-dasharray="2 4" opacity=".5"/>

    <g class="node node-defense enter e3" transform="translate(1360 412)">
      <rect width="200" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">ANOMALY DETECTION</text>
      <text x="14" y="40" class="label">ML-based monitoring</text>
    </g>
    <path d="M 1060 450 C 1180 442, 1280 440, 1360 440" fill="none" stroke="#0891b2" stroke-width="1" stroke-dasharray="2 4" opacity=".5"/>

    <g class="node node-defense enter e4" transform="translate(1360 572)">
      <rect width="200" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">ENCRYPTION / AUDIT</text>
      <text x="14" y="40" class="label">logs • crypto • trace</text>
    </g>
    <path d="M 1050 540 C 1180 560, 1280 590, 1360 600" fill="none" stroke="#0891b2" stroke-width="1" stroke-dasharray="2 4" opacity=".5"/>

    <g class="node node-defense enter e5" transform="translate(1360 712)">
      <rect width="200" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">HUMAN OVERSIGHT</text>
      <text x="14" y="40" class="label">review • red-team</text>
    </g>
    <path d="M 1010 620 C 1160 660, 1280 700, 1360 740" fill="none" stroke="#0891b2" stroke-width="1" stroke-dasharray="2 4" opacity=".5"/>

    <!-- ================ SAFE USER APPLICATIONS (bottom) ================ -->
    <g class="node node-user enter e6" transform="translate(700 790)">
      <rect width="200" height="56" rx="6"/>
      <text x="14" y="22" font-weight="600">TRUSTED OUTPUT</text>
      <text x="14" y="40" class="label">apps • users • services</text>
    </g>
